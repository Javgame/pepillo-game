<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cachito — Juego de Dados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
      display: flex; justify-content: center;
      background: #0f1320; margin: 0; padding: 20px; min-height: 100vh;
    }
    #wrap {
      width: min(700px, 98vw); background: #fff;
      border-radius: 14px; padding: 16px 18px 24px;
    }
    h1 { margin: 6px 0 2px; font-size: 26px; }
    .subtitle { color: #555; margin: 0 0 14px; font-size: 14px; }

    /* ── Dice ── */
    #dice-area {
      display: flex; gap: 10px; justify-content: center; margin: 14px 0 8px;
    }
    .die {
      width: 66px; height: 66px;
      background: #fff; border: 3px solid #333; border-radius: 10px;
      display: grid; grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 6px; gap: 2px;
      cursor: default;
      transition: transform 0.12s, background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .die.clickable { cursor: pointer; }
    .die.clickable:hover { background: #f0f8ff; }
    .die.held {
      background: #fff8e1; border-color: #f59f00;
      transform: translateY(-8px);
      box-shadow: 0 4px 12px rgba(245,159,0,0.3);
    }
    .die.held:hover { background: #fff3c4; }
    .die.inactive { opacity: 0.45; }
    @keyframes spin {
      0%   { transform: rotateY(0deg)   scale(1);   }
      50%  { transform: rotateY(90deg)  scale(1.1); }
      100% { transform: rotateY(0deg)   scale(1);   }
    }
    .die.rolling { animation: spin 0.25s ease-in-out; }
    .die-cell { display: flex; align-items: center; justify-content: center; }
    .dot { width: 10px; height: 10px; background: #222; border-radius: 50%; }
    .die.held .dot { background: #b76e00; }

    /* ── Controls ── */
    #controls { text-align: center; margin: 12px 0 6px; }
    button {
      border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin: 0 5px;
      transition: background 0.15s, opacity 0.15s;
    }
    #btn-roll { background: #388e3c; color: #fff; }
    #btn-roll:hover:not(:disabled) { background: #2e7d32; }
    #btn-roll:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-new { background: #607d8b; color: #fff; }
    #btn-new:hover { background: #546e7a; }
    #roll-info { text-align: center; font-size: 13px; color: #666; min-height: 18px; margin-bottom: 4px; }

    /* ── Message ── */
    #msg {
      text-align: center; font-size: 14px; min-height: 20px;
      color: #555; font-style: italic; margin: 4px 0 10px;
    }
    #msg.special { color: #c62828; font-weight: 700; font-style: normal; font-size: 16px; }

    /* ── Scorecard ── */
    #scorecard { border: 2px solid #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
    .sec-header {
      background: #37474f; color: #fff;
      padding: 5px 12px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.8px;
    }
    .score-row {
      display: flex; align-items: center;
      padding: 7px 12px; border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    .score-row:last-child { border-bottom: none; }
    .score-row.available        { cursor: pointer; }
    .score-row.available:hover  { background: #e3f2fd; }
    .score-row.available.good   { background: #f1f8e9; }
    .score-row.available.good:hover { background: #dcedc8; }
    .score-row.used             { background: #fafafa; }
    .score-row.unavailable      { opacity: 0.45; }
    .row-name { font-size: 14px; font-weight: 600; min-width: 90px; }
    .row-desc { font-size: 12px; color: #888; flex: 1; margin: 0 8px; }
    .row-val  { min-width: 44px; text-align: right; font-size: 15px; font-weight: 700; }
    .row-val.pending      { color: #aaa; }
    .row-val.preview-pos  { color: #388e3c; }
    .row-val.preview-zero { color: #e53935; font-style: italic; }
    .row-val.scored       { color: #1565c0; }
    .bonus-info {
      display: flex; padding: 6px 12px; background: #fffde7;
      font-size: 12px; border-bottom: 1px solid #f0f0f0;
    }
    .total-row {
      display: flex; padding: 9px 12px; font-weight: 700;
      background: #eceff1; border-top: 2px solid #cfd8dc;
    }
    .grand-total { background: #e0f2f1 !important; border-top: 2px solid #80cbc4 !important; }
    .total-row .row-name { font-size: 14px; flex: 1; }
    .total-row .row-val  { font-size: 16px; color: #37474f; }
    .grand-total .row-val { font-size: 18px; color: #00695c; }

    /* ── Game Over ── */
    #game-over {
      display: none; text-align: center;
      background: #e8f5e9; border-radius: 10px;
      padding: 20px; margin-top: 14px;
    }
    #game-over h2 { margin: 0 0 6px; color: #2e7d32; }
    .final-pts   { font-size: 48px; font-weight: 800; color: #1b5e20; }
    .final-grade { font-size: 18px; font-weight: 600; color: #388e3c; margin: 4px 0 14px; }
  </style>
</head>
<body>
<div id="wrap">
  <h1>&#127922; Cachito</h1>
  <p class="subtitle">Juego de dados &middot; 10 turnos &middot; Consigue las mejores combinaciones</p>

  <div id="dice-area"></div>
  <div id="msg"></div>

  <div id="controls">
    <button id="btn-roll" onclick="roll()">&#127922; Tirar dados</button>
    <button id="btn-new"  onclick="newGame()">Nueva partida</button>
  </div>
  <div id="roll-info"></div>

  <div id="scorecard"></div>

  <div id="game-over">
    <h2>&#127881; Partida terminada</h2>
    <div class="final-pts"   id="go-pts"></div>
    <div class="final-grade" id="go-grade"></div>
    <button onclick="newGame()" style="background:#388e3c;color:#fff">&#127922; Jugar de nuevo</button>
  </div>

</div>

<script>
// ── Dot positions [row, col] en rejilla 3×3 ──────────────────────────────────
const DOTS = {
  1: [[1,1]],
  2: [[0,2],[2,0]],
  3: [[0,2],[1,1],[2,0]],
  4: [[0,0],[0,2],[2,0],[2,2]],
  5: [[0,0],[0,2],[1,1],[2,0],[2,2]],
  6: [[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]],
};

// ── Categorías de puntuación ─────────────────────────────────────────────────
const CATS = [
  { id:'ones',     name:'Unos',     desc:'Suma de todos los 1', section:'upper',
    calc: d => d.filter(x=>x===1).reduce((a,b)=>a+b, 0) },
  { id:'twos',     name:'Doses',    desc:'Suma de todos los 2', section:'upper',
    calc: d => d.filter(x=>x===2).reduce((a,b)=>a+b, 0) },
  { id:'threes',   name:'Treses',   desc:'Suma de todos los 3', section:'upper',
    calc: d => d.filter(x=>x===3).reduce((a,b)=>a+b, 0) },
  { id:'fours',    name:'Cuatros',  desc:'Suma de todos los 4', section:'upper',
    calc: d => d.filter(x=>x===4).reduce((a,b)=>a+b, 0) },
  { id:'fives',    name:'Cincos',   desc:'Suma de todos los 5', section:'upper',
    calc: d => d.filter(x=>x===5).reduce((a,b)=>a+b, 0) },
  { id:'sixes',    name:'Seises',   desc:'Suma de todos los 6', section:'upper',
    calc: d => d.filter(x=>x===6).reduce((a,b)=>a+b, 0) },
  { id:'escalera', name:'Escalera', desc:'Secuencia 1-5 o 2-6 = 20 pts', section:'lower',
    calc: d => {
      const s = new Set(d);
      return ((s.has(1)&&s.has(2)&&s.has(3)&&s.has(4)&&s.has(5)) ||
              (s.has(2)&&s.has(3)&&s.has(4)&&s.has(5)&&s.has(6))) ? 20 : 0;
    }
  },
  { id:'full',     name:'Full',     desc:'Trío + par = 30 pts', section:'lower',
    calc: d => {
      const v = cntVals(d);
      return (v.some(n=>n===3) && v.some(n=>n===2)) ? 30 : 0;
    }
  },
  { id:'poker',    name:'Póker',    desc:'4 iguales = 40 pts', section:'lower',
    calc: d => cntVals(d).some(n=>n>=4) ? 40 : 0
  },
  { id:'cachito',  name:'Cachito',  desc:'5 iguales = 50 pts (100 al 1.er tiro)', section:'lower',
    calc: (d, firstRoll) => cntVals(d).some(n=>n>=5) ? (firstRoll ? 100 : 50) : 0
  },
];

function cntVals(d) {
  const cnt = {};
  d.forEach(x => { cnt[x] = (cnt[x] || 0) + 1; });
  return Object.values(cnt);
}

// ── Estado ───────────────────────────────────────────────────────────────────
let dice, held, rollCount, scores, turnsUsed, gameOver;

function newGame() {
  dice      = [1,1,1,1,1];
  held      = [false,false,false,false,false];
  rollCount = 0;
  scores    = {};
  turnsUsed = 0;
  gameOver  = false;
  document.getElementById('game-over').style.display = 'none';
  setMsg('Presiona "Tirar dados" para comenzar.');
  renderDice();
  renderScorecard();
  updateControls();
}

// ── Render dados ──────────────────────────────────────────────────────────────
function renderDice() {
  const area = document.getElementById('dice-area');
  area.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    const canClick = rollCount > 0 && rollCount < 3 && !gameOver;
    let cls = 'die';
    if (held[i])        cls += ' held';
    if (canClick)       cls += ' clickable';
    if (rollCount === 0) cls += ' inactive';
    div.className = cls;
    div.title = canClick ? (held[i] ? 'Soltar (se volverá a tirar)' : 'Mantener este dado') : '';

    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const cell = document.createElement('div');
        cell.className = 'die-cell';
        if (DOTS[dice[i]].some(([dr,dc]) => dr===r && dc===c)) {
          const dot = document.createElement('div');
          dot.className = 'dot';
          cell.appendChild(dot);
        }
        div.appendChild(cell);
      }
    }

    if (canClick) div.addEventListener('click', () => toggleHold(i));
    area.appendChild(div);
  }
}

function toggleHold(i) {
  if (rollCount === 0 || rollCount >= 3 || gameOver) return;
  held[i] = !held[i];
  renderDice();
  renderScorecard();
}

// ── Tirar ────────────────────────────────────────────────────────────────────
function roll() {
  if (rollCount >= 3 || gameOver) return;

  const isFirst = rollCount === 0;
  if (isFirst) held = [false,false,false,false,false];
  rollCount++;

  for (let i = 0; i < 5; i++) {
    if (!held[i]) dice[i] = Math.ceil(Math.random() * 6);
  }

  renderDice();

  // Animación en los dados que se tiraron
  document.querySelectorAll('.die').forEach((el, i) => {
    if (!held[i]) {
      el.classList.add('rolling');
      setTimeout(() => el.classList.remove('rolling'), 280);
    }
  });

  // Mensaje
  if (cntVals(dice).some(n => n >= 5)) {
    setMsg(isFirst ? '¡¡CACHITO AL PRIMER TIRO!! 100 puntos' : '¡Cachito! 50 puntos', isFirst);
  } else if (rollCount === 3) {
    setMsg('Última tirada — elige una categoría para anotar.');
  } else {
    const sug = getBestSuggestion();
    setMsg(sug ? 'Sugerencia: ' + sug : 'Elige qué dados guardar y vuelve a tirar.');
  }

  renderScorecard();
  updateControls();
}

function getBestSuggestion() {
  const opts = CATS
    .filter(c => !(c.id in scores))
    .map(c => ({ name: c.name, val: evalCat(c) }))
    .filter(x => x.val > 0)
    .sort((a, b) => b.val - a.val);
  return opts.length ? `${opts[0].name} (${opts[0].val} pts)` : null;
}

function evalCat(cat) {
  return cat.id === 'cachito' ? cat.calc(dice, rollCount === 1) : cat.calc(dice);
}

// ── Anotar categoría ──────────────────────────────────────────────────────────
function scoreCategory(catId) {
  if (rollCount === 0 || catId in scores || gameOver) return;
  const cat = CATS.find(c => c.id === catId);
  const val = evalCat(cat);
  scores[catId] = val;
  turnsUsed++;

  if      (val === 100) setMsg('¡¡Cachito al primer tiro!! +100 puntos 🎉', true);
  else if (val > 0)     setMsg(`${cat.name}: +${val} puntos`);
  else                  setMsg(`${cat.name}: 0 puntos (anotado como cero)`);

  if (turnsUsed >= 10) { endGame(); return; }

  held      = [false,false,false,false,false];
  rollCount = 0;
  renderDice();
  renderScorecard();
  updateControls();
}

// ── Totales ───────────────────────────────────────────────────────────────────
const UPPER_IDS = ['ones','twos','threes','fours','fives','sixes'];
const LOWER_IDS = ['escalera','full','poker','cachito'];

function upperTotal() {
  return UPPER_IDS.filter(id => id in scores).reduce((s, id) => s + scores[id], 0);
}
function bonus() { return upperTotal() >= 63 ? 35 : 0; }
function lowerTotal() {
  return LOWER_IDS.filter(id => id in scores).reduce((s, id) => s + scores[id], 0);
}
function grandTotal() { return upperTotal() + bonus() + lowerTotal(); }

// ── Render tabla ──────────────────────────────────────────────────────────────
function renderScorecard() {
  const card = document.getElementById('scorecard');
  card.innerHTML = '';

  // Sección superior
  card.appendChild(mkHeader('SECCIÓN SUPERIOR'));
  CATS.filter(c => c.section === 'upper').forEach(c => card.appendChild(mkRow(c)));

  // Bono
  const ut    = upperTotal();
  const bon   = bonus();
  const toGo  = Math.max(0, 63 - ut);
  const bDiv  = document.createElement('div');
  bDiv.className = 'bonus-info';
  bDiv.innerHTML = `<span style="flex:1">Bono superior (≥ 63 pts &rarr; +35)</span>
    <span style="font-weight:700;color:${bon ? '#2e7d32' : '#888'}">${bon ? '+35 ✓' : `Faltan ${toGo}`}</span>`;
  card.appendChild(bDiv);
  card.appendChild(mkTotalRow('Total superior', ut + bon));

  // Sección inferior
  card.appendChild(mkHeader('SECCIÓN INFERIOR'));
  CATS.filter(c => c.section === 'lower').forEach(c => card.appendChild(mkRow(c)));
  card.appendChild(mkTotalRow('Total inferior', lowerTotal()));

  // Total general
  const gt = mkTotalRow('TOTAL', grandTotal());
  gt.className = 'total-row grand-total';
  card.appendChild(gt);
}

function mkHeader(text) {
  const d = document.createElement('div');
  d.className = 'sec-header';
  d.textContent = text;
  return d;
}

function mkRow(cat) {
  const row     = document.createElement('div');
  const used      = cat.id in scores;
  const available = rollCount > 0 && !used && !gameOver;
  const preview   = available ? evalCat(cat) : null;

  let cls = 'score-row';
  if      (used)                        cls += ' used';
  else if (available && preview > 0)    cls += ' available good';
  else if (available)                   cls += ' available';
  else                                  cls += ' unavailable';
  row.className = cls;

  const valEl = document.createElement('span');
  valEl.className = 'row-val';
  if (used) {
    valEl.className += ' scored';
    valEl.textContent = scores[cat.id];
  } else if (available) {
    valEl.className += preview > 0 ? ' preview-pos' : ' preview-zero';
    valEl.textContent = preview;
  } else {
    valEl.className += ' pending';
    valEl.textContent = '—';
  }

  row.innerHTML = `<span class="row-name">${cat.name}</span><span class="row-desc">${cat.desc}</span>`;
  row.appendChild(valEl);

  if (available) {
    row.addEventListener('click', () => scoreCategory(cat.id));
    row.title = `Anotar ${cat.name}: ${preview} pts`;
  }
  return row;
}

function mkTotalRow(label, val) {
  const d = document.createElement('div');
  d.className = 'total-row';
  d.innerHTML = `<span class="row-name">${label}</span><span class="row-val">${val}</span>`;
  return d;
}

// ── Controles ─────────────────────────────────────────────────────────────────
function updateControls() {
  document.getElementById('btn-roll').disabled = rollCount >= 3 || gameOver;
  const info = document.getElementById('roll-info');
  if (gameOver) { info.textContent = ''; return; }
  const left = 3 - rollCount;
  const turn = turnsUsed + 1;
  info.textContent = rollCount === 0
    ? `Turno ${turn} de 10`
    : `Turno ${turn} de 10  ·  Tiradas restantes: ${left}`;
}

function setMsg(text, special = false) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = special ? 'special' : '';
}

// ── Fin de partida ────────────────────────────────────────────────────────────
function endGame() {
  gameOver = true;
  const total = grandTotal();
  const grades = [
    [300, '¡Increíble! Eres un experto en cachito 🏆'],
    [230, '¡Excelente resultado! 🌟'],
    [170, '¡Muy bien jugado! 👍'],
    [100, 'Buen intento — sigue practicando'],
    [  0, 'La suerte no fue tu aliada hoy'],
  ];
  const grade = grades.find(([min]) => total >= min)[1];
  document.getElementById('go-pts').textContent   = total;
  document.getElementById('go-grade').textContent = grade;
  document.getElementById('game-over').style.display = 'block';
  document.getElementById('game-over').scrollIntoView({ behavior: 'smooth' });
  renderScorecard();
  updateControls();
}

// ── Arrancar ──────────────────────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
